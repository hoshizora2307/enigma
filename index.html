<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_CRITICAL_ERROR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --main-red: #ff0000; }
        
        body, html {
            background: #000;
            color: var(--main-red);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow-x: hidden;
        }

        .space {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #110000 0%, #000 100%);
            z-index: -2;
        }

        /* 画面全体のグリッチ揺れ */
        @keyframes quake {
            0% { transform: translate(0,0); }
            10% { transform: translate(-3px, -3px); filter: hue-rotate(90deg); }
            20% { transform: translate(3px, 3px); }
            30% { transform: translate(-3px, 3px); }
            100% { transform: translate(0,0); }
        }

        .emergency-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.2);
            display: none; z-index: -1;
            animation: flash 0.15s infinite;
        }

        @keyframes flash {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0; }
        }

        #terminal {
            padding: 20px;
            box-sizing: border-box;
            padding-bottom: 300px;
        }

        .line {
            font-size: 14px;
            margin-bottom: 5px;
            text-shadow: 0 0 5px var(--main-red);
            word-break: break-all;
        }

        /* 中央固定の警告ボックス */
        #final-message {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            background: rgba(230, 0, 0, 0.98);
            color: white;
            padding: 25px;
            border: 4px double white;
            display: none;
            z-index: 1000;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 0 50px #ff0000;
        }

        .warning-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px #000;
        }

        .btn-understand {
            margin-top: 25px;
            padding: 15px 30px;
            background: #fff;
            color: #ff0000;
            border: none;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .btn-understand:active {
            transform: scale(0.9);
        }

        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="space"></div>
    <div class="scanline"></div>
    <div class="emergency-bg" id="alert-bg"></div>

    <div id="terminal">
        <div id="output"></div>
        <span id="active-line"></span><span id="cursor" style="display:inline-block; width:8px; height:1.2em; background:red;"></span>
    </div>

    <div id="final-message">
        <div class="warning-title">⚠️ 星空からの警告</div>
        <p style="font-size: 1.15em; line-height: 1.5; text-align: left; margin: 0;">
            わたしはあなたのこのような情報を簡単にみることができる。<br><br>
            クラッカーたちはこれらを悪用することができる。<br><br>
            怪しいサイトにはアクセスしないように気を付けて。
        </p>
        
        <!-- 理解しましたボタン：ハリボー公式サイトへ -->
        <button class="btn-understand" onclick="window.location.href='https://www.haribo.com/ja-jp'">
            理解しました
        </button>
    </div>

    <script>
        const output = document.getElementById('output');
        const activeLine = document.getElementById('active-line');
        const finalMessage = document.getElementById('final-message');
        const alertBg = document.getElementById('alert-bg');

        async function typeLog(text, delay = 15) {
            return new Promise(resolve => {
                let i = 0;
                const interval = setInterval(() => {
                    activeLine.textContent += text[i];
                    i++;
                    if (i === text.length) {
                        clearInterval(interval);
                        output.innerHTML += `<div class="line">${activeLine.textContent}</div>`;
                        activeLine.textContent = '';
                        window.scrollTo(0, document.body.scrollHeight);
                        setTimeout(resolve, 40);
                    }
                }, delay);
            });
        }

        async function startSystem() {
            await typeLog("[!] WARNING: COSMIC BREACH DETECTED");
            await typeLog("[!] INTERCEPTING ENCRYPTED DATA...");
            
            for(let i=0; i<=5; i++) {
                await typeLog(`[CAPTURING] ${i*20}% [${'#'.repeat(i*2)}${'.'.repeat(10-i*2)}]`, 10);
            }

            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                await typeLog(`[!] TARGET_IP: ${data.ip}`);
                await typeLog(`[!] PROVIDER : ${data.org}`);
                await typeLog(`[!] LOCATION : ${data.city}, ${data.country_name}`);
            } catch(e) {
                await typeLog("[!] ERR: IP_SHIELD_DETECTED");
            }

            await typeLog(`[!] DEVICE_OS: ${navigator.platform}`);
            await typeLog(`[!] BROWSER  : ${navigator.userAgent.split(' ')[0]}`);
            await typeLog(`[!] CORES    : ${navigator.hardwareConcurrency || 'N/A'}`);
            await typeLog(`[!] MEMORY   : ${navigator.deviceMemory || 'N/A'} GB`);
            await typeLog(`[!] BATTERY  : ${await getBatteryInfo()}`);
            
            await typeLog("--------------------------------");
            await typeLog("[!] ALL DATA EXPOSED.");
            await typeLog("[!] DISCONNECTING IN 3... 2... 1...");

            triggerTerror();
        }

        async function getBatteryInfo() {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                return `${Math.round(b.level * 100)}%`;
            }
            return "UNKNOWN";
        }

        function triggerTerror() {
            document.body.style.animation = "quake 0.1s infinite";
            alertBg.style.display = "block";
            
            // バイブレーション（Androidなど）
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 500]);
            }
            
            setTimeout(() => {
                finalMessage.style.display = "block";
                document.getElementById('cursor').style.display = "none";
            }, 600);
        }

        window.onload = () => setTimeout(startSystem, 800);
    </script>
</body>
</html>
