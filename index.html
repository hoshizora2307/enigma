<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_CRITICAL_ERROR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --main-red: #ff0000; }
        
        body, html {
            background: #000;
            color: var(--main-red);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow-x: hidden; /* 横揺れ対策 */
        }

        /* 宇宙背景 */
        .space {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #110000 0%, #000 100%);
            z-index: -2;
        }

        /* 画面全体のグリッチ揺れアニメーション */
        @keyframes quake {
            0% { transform: translate(0,0); }
            10% { transform: translate(-2px, -2px); filter: hue-rotate(90deg); }
            20% { transform: translate(2px, 2px); }
            30% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(0,0); }
        }

        .emergency-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.2);
            display: none; z-index: -1;
            animation: flash 0.2s infinite;
        }

        @keyframes flash {
            0% { opacity: 0.5; }
            50% { opacity: 0; }
            100% { opacity: 0.5; }
        }

        #terminal {
            padding: 20px;
            box-sizing: border-box;
            padding-bottom: 300px; /* 警告文が表示されるための余白 */
        }

        .line {
            font-size: 14px;
            margin-bottom: 5px;
            text-shadow: 0 0 5px var(--main-red);
            word-break: break-all;
        }

        /* 警告ボックスを画面中央付近に固定 */
        #final-message {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            background: rgba(255, 0, 0, 0.95);
            color: white;
            padding: 20px;
            border: 4px double white;
            display: none;
            z-index: 1000;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 0 50px #ff0000;
        }

        .warning-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 10px;
            text-decoration: underline;
        }

        /* 走査線 */
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="space"></div>
    <div class="scanline"></div>
    <div class="emergency-bg" id="alert-bg"></div>

    <div id="terminal">
        <div id="output"></div>
        <span id="active-line"></span><span id="cursor" style="display:inline-block; width:8px; height:1.2em; background:red;"></span>
    </div>

    <div id="final-message">
        <div class="warning-title">⚠️ 星空からの警告</div>
        <p style="font-size: 1.1em; line-height: 1.4; margin: 0;">
            わたしはあなたのこのような情報を簡単にみることができる。<br><br>
            クラッカーたちはこれらを悪用することができる。<br><br>
            怪しいサイトにはアクセスしないように気を付けて。
        </p>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:white; color:red; border:none; font-weight:bold;">理解しました</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const activeLine = document.getElementById('active-line');
        const finalMessage = document.getElementById('final-message');
        const alertBg = document.getElementById('alert-bg');

        async function typeLog(text, delay = 20) {
            return new Promise(resolve => {
                let i = 0;
                const interval = setInterval(() => {
                    activeLine.textContent += text[i];
                    i++;
                    if (i === text.length) {
                        clearInterval(interval);
                        output.innerHTML += `<div class="line">${activeLine.textContent}</div>`;
                        activeLine.textContent = '';
                        window.scrollTo(0, document.body.scrollHeight);
                        setTimeout(resolve, 50);
                    }
                }, delay);
            });
        }

        async function startSystem() {
            await typeLog("[!] WARNING: UNKNOWN SIGNAL DETECTED");
            await typeLog("[!] INITIATING TRACE...");
            
            // 偽のプログレスバー演出
            for(let i=0; i<=10; i++) {
                await typeLog(`[SCANNING] ${i*10}% [${'#'.repeat(i)}${'.'.repeat(10-i)}]`, 10);
            }

            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                await typeLog(`[FOUND] IPv4_SOURCE: ${data.ip}`);
                await typeLog(`[FOUND] PROVIDER: ${data.org}`);
                await typeLog(`[FOUND] GEO_LOC: ${data.city}, ${data.country_name}`);
                await typeLog(`[FOUND] TIMEZONE: ${data.timezone}`);
            } catch(e) {
                await typeLog("[ERROR] TRACE_FAILED: PROXY DETECTED");
            }

            await typeLog(`[FOUND] CORE_COUNT: ${navigator.hardwareConcurrency || '??'} cores`);
            await typeLog(`[FOUND] MEMORY: ${navigator.deviceMemory || '??'} GB`);
            await typeLog(`[FOUND] SCREEN: ${screen.width}x${screen.height}`);
            await typeLog(`[FOUND] BATTERY: ${await getBatteryInfo()}`);
            
            await typeLog("--------------------------------");
            await typeLog("[!] SIGNAL STRENGTH: CRITICAL");
            await typeLog("[!] ALERT: THE VOID IS WATCHING YOU.");

            // 恐怖演出の開始
            triggerTerror();
        }

        async function getBatteryInfo() {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                return `${Math.round(b.level * 100)}% (${b.charging ? 'Charging' : 'Discharging'})`;
            }
            return "UNKNOWN";
        }

        function triggerTerror() {
            // 1. 画面揺らし
            document.body.style.animation = "quake 0.1s infinite";
            // 2. 赤点滅
            alertBg.style.display = "block";
            // 3. バイブレーション（Android/一部スマホのみ）
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
            
            // 4. 警告文を中央に表示
            setTimeout(() => {
                finalMessage.style.display = "block";
                document.getElementById('cursor').style.display = "none";
            }, 500);
        }

        window.onload = () => setTimeout(startSystem, 1000);
    </script>
</body>
</html>
